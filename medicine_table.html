<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medicine Boxes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #2563eb;
      --accent-soft: #eaf1ff;
      --warn: #9a3412;
      --warn-bg: #fff7ed;
      --ok: #166534;
      --ok-bg: #ecfdf3;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px clamp(16px, 3vw, 32px) 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(2, minmax(150px, 210px));
      gap: 10px;
      padding: 12px clamp(16px, 3vw, 32px);
      background: rgba(246, 247, 249, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    main {
      padding: 18px clamp(16px, 3vw, 32px) 34px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 65px;
      z-index: 5;
      background: #f9fafb;
      color: #344054;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .thumb {
      width: 108px;
      height: 144px;
      display: block;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef1f6;
    }

    .name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .search-name {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .description {
      max-width: 520px;
      line-height: 1.4;
    }

    .confidence {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .confidence.high {
      background: var(--ok-bg);
      color: var(--ok);
    }

    .confidence.medium,
    .confidence.low {
      background: var(--warn-bg);
      color: var(--warn);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty {
      display: none;
      padding: 36px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      th {
        top: 166px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Аптечка: две коробки</h1>
    <p class="subtitle">Поиск по названию, описанию, действующему веществу и пути к фото.</p>
  </header>

  <div class="toolbar">
    <input id="search" type="search" placeholder="Поиск: парацетамол, omeprazole, бинт, First box..." autocomplete="off">
    <select id="boxFilter" aria-label="Фильтр по коробке">
      <option value="all">Все коробки</option>
      <option value="First box">First box</option>
      <option value="Second box">Second box</option>
    </select>
    <select id="confidenceFilter" aria-label="Фильтр по уверенности">
      <option value="all">Любая уверенность</option>
      <option value="high">Только high</option>
      <option value="medium">Только medium</option>
      <option value="low">Только low</option>
    </select>
  </div>

  <main>
    <div class="stats" id="stats"></div>
    <div class="empty" id="empty">Ничего не найдено. Попробуй другой запрос или сбрось фильтр.</div>
    <div id="tables"></div>
  </main>

  <script>
    const state = {
      items: [],
      query: "",
      box: "all",
      confidence: "all"
    };

    const searchInput = document.querySelector("#search");
    const boxFilter = document.querySelector("#boxFilter");
    const confidenceFilter = document.querySelector("#confidenceFilter");
    const tables = document.querySelector("#tables");
    const stats = document.querySelector("#stats");
    const empty = document.querySelector("#empty");

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;");

    const fileName = (path) => path.split("/").pop();

    const previewPath = (item) => {
      const base = fileName(item.file_path).replace(/\.HEIC$/i, ".jpg");
      return `_previews_full/${encodeURIComponent(item.box)}/${encodeURIComponent(base)}`;
    };

    const sourcePath = (item) => item.file_path.replace("C:/Source/Medicine/", "");

    const searchable = (item) => [
      item.box,
      item.file_path,
      item.medicine,
      item.search_name,
      item.description,
      item.confidence
    ].join(" ").toLocaleLowerCase();

    function filteredItems() {
      const query = state.query.trim().toLocaleLowerCase();
      return state.items.filter((item) => {
        const boxOk = state.box === "all" || item.box === state.box;
        const confidenceOk = state.confidence === "all" || item.confidence === state.confidence;
        const queryOk = !query || searchable(item).includes(query);
        return boxOk && confidenceOk && queryOk;
      });
    }

    function renderStats(items) {
      const first = items.filter((item) => item.box === "First box").length;
      const second = items.filter((item) => item.box === "Second box").length;
      const uncertain = items.filter((item) => item.confidence !== "high").length;
      stats.innerHTML = [
        `<span class="pill">Показано: <strong>${items.length}</strong></span>`,
        `<span class="pill">First box: <strong>${first}</strong></span>`,
        `<span class="pill">Second box: <strong>${second}</strong></span>`,
        `<span class="pill">Нужно проверить: <strong>${uncertain}</strong></span>`
      ].join("");
    }

    function row(item) {
      return `
        <tr>
          <td>
            <a href="${escapeHtml(previewPath(item))}" target="_blank">
              <img class="thumb" src="${escapeHtml(previewPath(item))}" alt="${escapeHtml(item.medicine)}" loading="lazy">
            </a>
          </td>
          <td>
            <div class="name">${escapeHtml(item.medicine)}</div>
            <div class="search-name">${escapeHtml(item.search_name)}</div>
          </td>
          <td class="description">${escapeHtml(item.description)}</td>
          <td>${escapeHtml(item.box)}</td>
          <td><span class="confidence ${escapeHtml(item.confidence)}">${escapeHtml(item.confidence)}</span></td>
          <td><a href="${escapeHtml(sourcePath(item))}" target="_blank">${escapeHtml(fileName(item.file_path))}</a></td>
        </tr>
      `;
    }

    function renderTable(box, items) {
      if (!items.length) return "";
      return `
        <section>
          <div class="section-title">
            <h2>${escapeHtml(box)}</h2>
            <span>${items.length} позиций</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Фото</th>
                  <th>Название</th>
                  <th>Описание</th>
                  <th>Коробка</th>
                  <th>Уверенность</th>
                  <th>Файл</th>
                </tr>
              </thead>
              <tbody>${items.map(row).join("")}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    function render() {
      const items = filteredItems();
      renderStats(items);
      empty.style.display = items.length ? "none" : "block";
      const first = items.filter((item) => item.box === "First box");
      const second = items.filter((item) => item.box === "Second box");
      tables.innerHTML = [
        renderTable("First box", first),
        renderTable("Second box", second)
      ].join("");
    }

    async function loadData() {
      const response = await fetch("medicine_index.json");
      if (!response.ok) throw new Error(`Cannot load medicine_index.json: ${response.status}`);
      const data = await response.json();
      state.items = data.items || [];
      render();
    }

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    boxFilter.addEventListener("change", (event) => {
      state.box = event.target.value;
      render();
    });

    confidenceFilter.addEventListener("change", (event) => {
      state.confidence = event.target.value;
      render();
    });

    loadData().catch((error) => {
      empty.style.display = "block";
      empty.textContent = `Не удалось загрузить medicine_index.json. Открой через локальный сервер. ${error.message}`;
    });
  </script>
</body>
</html>
